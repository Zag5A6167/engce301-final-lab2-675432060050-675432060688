server {
    listen 80;
    
    # DNS Resolver
    resolver 8.8.8.8 valid=30s;

    # ใช้ Public URL โดยตรงเพื่อให้มั่นใจว่าเชื่อมต่อได้ 100% สำหรับส่งงานโบนัส
    set $auth_url https://authservice-production-e242.up.railway.app;
    set $task_url https://taskservice-production-f87d.up.railway.app;
    set $user_url https://userservice-production-6411.up.railway.app;

    location /api/auth/ {
        proxy_pass $auth_url;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
        proxy_read_timeout 15s;
    }

    location /api/tasks/ {
        proxy_pass $task_url;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
        proxy_read_timeout 15s;
    }

    location /api/users/ {
        proxy_pass $user_url;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
        proxy_read_timeout 15s;
    }

    # Health check for Gateway
    location /health {
        access_log off;
        return 200 '{"status": "ok", "service": "api-gateway"}';
        add_header Content-Type application/json;
    }
}
