server {
    listen 80;
    
    # DNS Resolver for Railway Internal DNS
    resolver 127.0.0.11 valid=30s;

    # ใช้ variables เพื่อป้องกัน Nginx พังถ้า Service ปลายทางยังไม่พร้อมตอน Start
    set $auth_ups http://auth_service.railway.internal:3001;
    set $task_ups http://task_service.railway.internal:3002;
    set $user_ups http://user_service.railway.internal:3003;

    location /api/auth/ {
        proxy_pass $auth_ups;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/tasks/ {
        proxy_pass $task_ups;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/users/ {
        proxy_pass $user_ups;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Health check for Gateway
    location /health {
        access_log off;
        return 200 '{"status": "ok", "service": "api-gateway"}';
        add_header Content-Type application/json;
    }
}
