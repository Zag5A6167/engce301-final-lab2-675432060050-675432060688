server {
    listen 80;
    
    # DNS Resolver for Railway Internal DNS
    resolver 127.0.0.11 valid=30s;

    # ใช้ชื่อ Service ที่ตรงกับใน Railway (ตัด _ ออกตามหน้าจอ Dashboard)
    set $auth_ups http://authservice.railway.internal:3001;
    set $task_ups http://taskservice.railway.internal:3002;
    set $user_ups http://userservice.railway.internal:3003;

    location /api/auth/ {
        proxy_pass $auth_ups;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
    }

    location /api/tasks/ {
        proxy_pass $task_ups;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
    }

    location /api/users/ {
        proxy_pass $user_ups;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
    }

    # Health check for Gateway
    location /health {
        access_log off;
        return 200 '{"status": "ok", "service": "api-gateway"}';
        add_header Content-Type application/json;
    }
}
